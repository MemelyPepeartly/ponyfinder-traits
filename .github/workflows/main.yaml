name: Create Release

permissions:
  contents: write

on:
  push:
    branches:
      - main  # adjust to your default branch if different

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build release bundle
      run: |
        node ./tools/build-local.mjs

    - name: Zip module bundle
      run: |
        cd dist
        zip -r ../module.zip .

    - name: Extract version from package.json
      run: node -e "console.log('RELEASE_VERSION=' + require('./package.json').version)" >> $GITHUB_ENV

    - name: Create Release and Upload Asset
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.RELEASE_VERSION }}
        name: Release ${{ env.RELEASE_VERSION }}
        allowUpdates: true
        artifacts: "dist/module.json, ./module.zip"
        draft: false
        prerelease: false
